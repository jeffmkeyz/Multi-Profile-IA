<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Multi-Perfil IA Premium + Prompts</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030308; 
    --panel: rgba(11, 12, 20, 0.65); 
    --panel-2: rgba(18, 19, 30, 0.75);
    --border: rgba(255, 255, 255, 0.1); 
    --border-soft: rgba(255, 255, 255, 0.05);
    --text: #eef0f5; 
    --muted: #9ca3af; 
    --muted-dim: #6b7280;
    
    --mint: #10b981; --mint-glow: rgba(16, 185, 129, 0.4);
    --purple: #8b5cf6; --purple-glow: rgba(139, 92, 246, 0.4);
    --gold: #f59e0b; 
    --pink: #ec4899; --pink-glow: rgba(236, 72, 153, 0.4);
    --blue: #3b82f6; --blue-glow: rgba(59, 130, 246, 0.4);

    --font-display: 'Syne', sans-serif; 
    --font-mono: 'Space Mono', monospace;
  }
  
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; position: relative; overflow-x: hidden; }
  
  .bg-glow {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(800px circle at 15% -5%, rgba(139, 92, 246, 0.15), transparent 50%),
                radial-gradient(600px circle at 90% 10%, rgba(16, 185, 129, 0.12), transparent 50%),
                radial-gradient(700px circle at 50% 110%, rgba(236, 72, 153, 0.1), transparent 50%);
    filter: blur(40px);
  }
  
  main, header { position: relative; z-index: 1; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

  /* Topbar Premium */
  header.topbar {
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: space-between; 
    padding: 16px 24px; border-bottom: 1px solid var(--border); 
    background: rgba(11, 12, 20, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--purple), var(--blue), var(--mint));
    font-family: var(--font-display); font-weight: 800; color: #fff; font-size: 16px; flex-shrink: 0;
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .brand h1 { font-family: var(--font-display); font-size: 18px; font-weight: 800; margin: 0; letter-spacing: -0.5px; }
  .brand p { margin: 3px 0 0; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  
  .stats-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .ext-badge {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px;
    background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
    font-size: 11px; color: var(--blue); font-weight: 700; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
  }
  .ext-badge .dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 8px var(--blue); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

  .stat-pill {
    display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 12px; 
    background: rgba(255,255,255,0.03); border: 1px solid var(--border); font-size: 11px; color: var(--muted);
    backdrop-filter: blur(8px); transition: transform 0.2s;
  }
  .stat-pill:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }
  .stat-pill b { font-family: var(--font-display); font-size: 16px; color: var(--text); font-weight: 800; }
  .stat-pill.is-mint b { color: var(--mint); text-shadow: 0 0 8px var(--mint-glow); }

  main.container { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; display: flex; flex-direction: column; gap: 20px; }

  /* Glassmorphism */
  .glass-panel { background: var(--panel); border: 1px solid var(--border); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 16px; padding: 16px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }

  /* Ready Strip */
  .ready-strip { padding: 18px 20px; position: relative; overflow: hidden; }
  .ready-strip::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(to bottom, var(--mint), var(--blue)); }
  .ready-strip .ready-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; display: block; font-weight: 700; }
  .ready-chips { display: flex; gap: 10px; flex-wrap: wrap; }
  .ready-chip { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 24px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); font-size: 12.5px; color: var(--text); cursor: pointer; transition: all 0.2s; }
  .ready-chip:hover { border-color: var(--mint); background: rgba(16, 185, 129, 0.2); transform: translateY(-2px); box-shadow: 0 4px 12px var(--mint-glow); }
  .ready-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  
  /* Tabs Navegación */
  .nav-tabs { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 16px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 12px; font-family: var(--font-display); font-size: 14px; font-weight: 700; border: none; background: transparent; color: var(--muted); border-radius: 12px; cursor: pointer; transition: 0.3s; }
  .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
  .tab-btn.active { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(59,130,246,0.2)); color: #fff; border: 1px solid rgba(139,92,246,0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-shadow: 0 1px 5px rgba(139,92,246,0.5); }

  /* Carril de Perfiles */
  .rail-wrap { display: flex; align-items: center; gap: 12px; padding: 10px 14px; }
  .profile-rail { display: flex; gap: 10px; overflow-x: auto; flex: 1; scrollbar-width: none; padding-bottom: 4px; }
  .profile-rail::-webkit-scrollbar { display: none; }
  .rail-chip { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 24px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); cursor: pointer; font-size: 13px; color: var(--muted); white-space: nowrap; transition: all 0.2s; font-family: var(--font-mono); font-weight: 600; }
  .rail-chip:hover { border-color: rgba(255,255,255,0.3); color: var(--text); background: rgba(255,255,255,0.05); }
  .rail-chip.is-active { background: linear-gradient(135deg, var(--purple), var(--blue)); border-color: transparent; color: #fff; box-shadow: 0 4px 15px var(--purple-glow); }
  .rail-chip .rdot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-dim); transition: 0.2s; }
  .rail-chip.is-active .rdot { background: #fff; box-shadow: 0 0 5px #fff; }

  /* Botones Vívidos */
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 13px; font-weight: 700; white-space: nowrap; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: var(--text); padding: 10px 18px; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); transform: translateY(-1px); }
  .btn.primary { background: linear-gradient(135deg, var(--purple), var(--pink)); border: none; color: #fff; box-shadow: 0 4px 15px var(--pink-glow); }
  .btn.primary:hover { box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6); transform: translateY(-2px); }
  .btn.success { background: linear-gradient(135deg, var(--mint), #059669); border: none; color: #fff; box-shadow: 0 4px 15px var(--mint-glow); }
  .btn.ghost { background: transparent; }
  .btn.danger { color: var(--pink); border-color: rgba(236, 72, 153, 0.3); }
  
  /* Toolbar */
  .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 10px; }
  .search-box { flex: 1; min-width: 220px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; transition: 0.2s; }
  .search-box:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
  .search-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 13px; }
  select { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 10px 16px; outline: none; cursor: pointer; transition: 0.2s; appearance: none; padding-right: 32px; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239ca3af' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 1em; }
  
  /* Icon Buttons */
  .icon-btn { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--muted); cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
  .icon-btn:hover { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
  .icon-btn.danger:hover { color: var(--pink); background: rgba(236, 72, 153, 0.1); border-color: var(--pink); }
  .icon-btn.action:hover { color: var(--blue); background: rgba(59, 130, 246, 0.1); border-color: var(--blue); box-shadow: 0 0 10px var(--blue-glow); }

  /* Forms */
  .form-panel { animation: formIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; border-top: 3px solid var(--blue); }
  @keyframes formIn { from { opacity: 0; transform: translateY(-10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .form-panel h3 { margin: 0 0 6px; font-family: var(--font-display); font-size: 16px; color: #fff; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .form-grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .form-panel input, .form-panel select, .form-panel textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-mono); font-size: 13px; padding: 12px 14px; outline: none; transition: 0.2s; }
  .form-panel input:focus, .form-panel select:focus, .form-panel textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
  .form-panel textarea { grid-column: 1/-1; min-height: 80px; resize: vertical; }
  .form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; align-items: center; }

  /* Lista y Cuentas */
  .profiles-list { display: flex; flex-direction: column; gap: 16px; }
  .profile-card { border: 1px solid var(--border); background: var(--panel); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .profile-head { display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; background: rgba(255,255,255,0.02); }
  .profile-head .chev { transition: transform 0.3s; }
  .profile-card.is-collapsed .chev { transform: rotate(-90deg); }
  .profile-name { font-family: var(--font-display); font-size: 16px; font-weight: 800; color: #fff; }
  .profile-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }
  .meta-pill { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); }
  .profile-body { max-height: 4000px; transition: max-height 0.4s ease; overflow: hidden; }
  .profile-card.is-collapsed .profile-body { max-height: 0; }
  
  .account-row { display: grid; grid-template-columns: 24px 1.5fr 1fr 1fr 1fr auto; align-items: center; gap: 14px; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-soft); margin-bottom: 10px; }
  .acc-service { display: flex; flex-direction: column; gap: 3px; }
  .svc-name { font-size: 14px; color: #fff; font-weight: 800; font-family: var(--font-display); }
  .svc-email { font-size: 11px; color: var(--muted); }
  .plan-badge { font-size: 10.5px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; font-weight: 800; width: fit-content; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
  .status-badge { display: flex; flex-direction: column; font-size: 11px; }
  .status-badge .s-label { font-weight: 800; }
  .status-badge.st-available .s-label { color: var(--mint); }
  .status-badge.st-cooldown .s-label { color: var(--gold); }
  .acc-actions { display: flex; gap: 6px; }

  /* Gestor de Prompts */
  .prompts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .prompt-card { background: rgba(18, 19, 30, 0.8); border: 1px solid var(--border); border-radius: 14px; padding: 16px; transition: 0.3s; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 10px; }
  .prompt-card:hover { border-color: var(--blue); box-shadow: 0 8px 20px var(--blue-glow); transform: translateY(-3px); }
  .prompt-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(to bottom, var(--purple), var(--blue)); }
  .prompt-title { font-family: var(--font-display); font-size: 15px; color: #fff; margin: 0; padding-right: 40px; }
  .prompt-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .p-tag { font-size: 10px; background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 10px; color: var(--mint); }
  .prompt-body { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 12px; font-size: 12px; color: var(--muted); max-height: 100px; overflow-y: auto; line-height: 1.5; white-space: pre-wrap; flex: 1; }
  .prompt-actions { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
  .copy-btn { background: rgba(59,130,246,0.1); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
  .copy-btn:hover { background: var(--blue); color: #fff; }

  .empty-state { text-align: center; padding: 60px 20px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 16px; color: var(--muted); }
  
  /* Toasts */
  .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 50; display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; }
  .toast { background: rgba(18, 19, 30, 0.95); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-size: 13px; font-weight: 700; color: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.6); animation: toastIn 0.3s forwards; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .toast.is-success { border-left: 4px solid var(--mint); box-shadow: 0 10px 40px var(--mint-glow); }
  .toast.is-ext { border-left: 4px solid var(--blue); box-shadow: 0 10px 40px var(--blue-glow); }

</style>
</head>
<body>

<div class="bg-glow"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">IA</span>
    <div><h1>Workstation IA</h1><p>Gestor + Prompts + Extensión</p></div>
  </div>
  <div class="stats-row" id="statsRow">
    <div class="ext-badge" title="Simulación de Extensión Activa"><span class="dot"></span> Extensión Link</div>
  </div>
</header>

<main class="container">
  
  <section class="ready-strip glass-panel" id="readyStrip"></section>

  <nav class="nav-tabs" id="mainTabs">
    <button class="tab-btn active" data-tab="accounts">🤖 Cuentas IA</button>
    <button class="tab-btn" data-tab="prompts">📝 Biblioteca de Prompts</button>
  </nav>

  <section class="rail-wrap glass-panel">
    <div class="profile-rail" id="profileRail"></div>
    <button class="btn primary" type="button" data-action="new-profile">+ Nuevo Perfil</button>
  </section>

  <section class="toolbar glass-panel" id="toolbarArea"></section>

  <section id="formZone"></section>
  <section id="mainZone"></section>

</main>

<div class="toast-wrap" id="toastWrap"></div>

<script>
(function(){
  'use strict';

  /* ============================================================
     ESTADO & APP CONFIG
     ============================================================ */
  const TG_ID = 'dev-' + Math.random().toString(36).slice(2, 9);
  
  let state = { profiles: [], accounts: [], prompts: [] };
  const ui = { 
    search:'', filterAI:'', filterStatus:'', activeProfile:null, 
    showForm:null, editingId:null, activeTab: 'accounts'
  };

  /* ============================================================
     MOCK API LOCAL (Para evitar errores si no hay backend)
     ============================================================ */
  function generateId() { return Math.random().toString(36).substr(2, 9); }
  
  async function apiFetch(path, options = {}) {
    // Simulador In-Memory instantáneo. Si hubiera fetch real, iría aquí.
    return new Promise((resolve) => {
      setTimeout(() => {
        const method = options.method || 'GET';
        const body = options.body ? JSON.parse(options.body) : null;
        
        if(path.includes('/api/state')) resolve(state);
        
        else if(path.includes('/api/profiles') && method === 'POST') {
          const newProf = { id: generateId(), name: body.name };
          state.profiles.push(newProf); resolve({ profile: newProf });
        }
        else if(path.includes('/api/accounts') && method === 'POST') {
          const newAcc = { id: generateId(), ...body, enabled: true };
          state.accounts.push(newAcc); resolve({ account: newAcc });
        }
        else if(path.includes('/api/prompts') && method === 'POST') {
          const newPrompt = { id: generateId(), ...body };
          state.prompts.push(newPrompt); resolve({ prompt: newPrompt });
        }
        else if(method === 'DELETE' && path.includes('/api/prompts/')) {
          const id = path.split('/').pop();
          state.prompts = state.prompts.filter(p => p.id !== id); resolve({});
        }
        else { resolve(state); } // Fallback genérico
      }, 200);
    });
  }

  /* ============================================================
     UTILIDADES & UI
     ============================================================ */
  function showToast(msg, kind){
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    const icon = kind === 'error' ? '❌ ' : kind === 'success' ? '✅ ' : kind === 'ext' ? '🔌 ' : 'ℹ️ ';
    el.className = 'toast ' + (kind ? 'is-'+kind : '');
    el.textContent = icon + msg;
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
  }

  function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function formatRemaining(ms){
    const m = Math.max(1, Math.ceil(ms/60000));
    return m > 60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m}m`;
  }
  
  function computeStatus(acc){
    if(!acc.enabled) return { key:'disabled', label:'Desactivada', remainingMs:0 };
    if(!acc.lastUsed || !acc.limitResetHours || !acc.limitCount) return { key:'available', label:'Disponible', remainingMs:0 };
    const resetAt = new Date(acc.lastUsed).getTime() + acc.limitResetHours * 3600 * 1000;
    const remaining = resetAt - Date.now();
    if(remaining <= 0) return { key:'available', label:'Disponible', remainingMs:0 };
    return { key:'cooldown', label:'En cooldown', remainingMs:remaining };
  }

  /* ============================================================
     RENDERIZADO NÚCLEO
     ============================================================ */
  function renderAll(){
    renderReadyStrip(); renderRail(); renderToolbar(); renderForm(); renderMain();
  }

  function renderReadyStrip(){
    const el = document.getElementById('readyStrip');
    const available = state.accounts.filter(a => computeStatus(a).key === 'available').map(a => ({ acc:a, profile: state.profiles.find(p=>p.id===a.profileId) }));
    if(available.length){
      el.innerHTML = `<span class="ready-label">🟢 Disponibles Ahora</span><div class="ready-chips">` + 
        available.map(({acc,profile}) => `
          <span class="ready-chip"><span class="dot" style="background:var(--mint)"></span>
          <b>${escapeHtml(acc.service)}</b> <span style="font-size:10px; color:var(--muted)">(${escapeHtml(profile?.name||'—')})</span></span>
        `).join('') + `</div>`;
    } else {
      el.innerHTML = `<div class="empty-state" style="padding:10px; border:none;">Todo en orden. Agrega herramientas para rastrear límites.</div>`;
    }
  }

  function renderRail(){
    const rail = document.getElementById('profileRail');
    const chips = [`<button class="rail-chip ${!ui.activeProfile?'is-active':''}" data-action="set-profile" data-id=""><span class="rdot"></span>Global</button>`];
    state.profiles.forEach(p => {
      chips.push(`<button class="rail-chip ${ui.activeProfile===p.id?'is-active':''}" data-action="set-profile" data-id="${p.id}"><span class="rdot"></span>${escapeHtml(p.name)}</button>`);
    });
    rail.innerHTML = chips.join('');
  }

  function renderToolbar(){
    const tb = document.getElementById('toolbarArea');
    if(ui.activeTab === 'accounts'){
      tb.innerHTML = `
        <label class="search-box"><input id="searchInput" type="text" placeholder="Buscar cuenta o IA..." value="${ui.search}"></label>
        <select id="filterAI"><option value="">Todas las IAs</option></select>
        <div style="flex:1"></div>
        <button class="btn success" data-action="open-form" data-type="account">+ Añadir Herramienta IA</button>
      `;
      // Listener para búsqueda
      tb.querySelector('#searchInput').addEventListener('input', e => { ui.search = e.target.value.toLowerCase(); renderMain(); });
    } else {
      tb.innerHTML = `
        <label class="search-box"><input id="searchInput" type="text" placeholder="Buscar prompt por título o tag..." value="${ui.search}"></label>
        <div style="flex:1"></div>
        <button class="btn primary" data-action="open-form" data-type="prompt">+ Crear Prompt</button>
      `;
      tb.querySelector('#searchInput').addEventListener('input', e => { ui.search = e.target.value.toLowerCase(); renderMain(); });
    }
  }

  function renderMain(){
    const zone = document.getElementById('mainZone');
    if(ui.activeTab === 'accounts') renderAccountsView(zone);
    else renderPromptsView(zone);
  }

  /* --- VISTA CUENTAS --- */
  function renderAccountsView(zone){
    let profilesToShow = ui.activeProfile ? [state.profiles.find(p=>p.id===ui.activeProfile)] : state.profiles;
    if(!profilesToShow.length || !profilesToShow[0]){ zone.innerHTML = `<div class="empty-state">No hay perfiles creados.</div>`; return; }
    
    zone.innerHTML = `<div class="profiles-list">` + profilesToShow.map(p => {
      const accs = state.accounts.filter(a => a.profileId === p.id && (!ui.search || a.service.toLowerCase().includes(ui.search)));
      let body = accs.length ? accs.map(renderAccountRow).join('') : `<div class="empty-state" style="padding:15px; border:none;">Sin cuentas.</div>`;
      return `
        <div class="profile-card">
          <div class="profile-head">
            <span class="profile-name">${escapeHtml(p.name)}</span>
            <span class="meta-pill">${accs.length} herramientas</span>
          </div>
          <div class="profile-body"><div style="padding: 0 20px 20px;">${body}</div></div>
        </div>`;
    }).join('') + `</div>`;
  }

  function renderAccountRow(acc){
    const st = computeStatus(acc);
    const dot = st.key === 'available' ? 'var(--mint)' : st.key === 'cooldown' ? 'var(--gold)' : 'var(--muted)';
    return `
      <div class="account-row">
        <span class="acc-dot" style="background:${dot}; width:10px; height:10px; border-radius:50%; box-shadow:0 0 10px ${dot}"></span>
        <div class="acc-service"><span class="svc-name">${escapeHtml(acc.service)}</span><span class="svc-email">${escapeHtml(acc.email||'—')}</span></div>
        <span class="plan-badge">${escapeHtml(acc.plan||'Free')}</span>
        <div class="status-badge"><span class="s-label" style="color:${dot}">${st.label}</span></div>
        <div class="acc-actions">
          <button class="icon-btn action" data-action="inject-ext" data-service="${acc.service}" title="Auto-Login Extensión">🔌</button>
          <button class="icon-btn" data-action="mark-used" data-id="${acc.id}" title="Marcar Uso (Cooldown)">⏳</button>
        </div>
      </div>`;
  }

  /* --- VISTA PROMPTS --- */
  function renderPromptsView(zone){
    let filtered = state.prompts;
    if(ui.activeProfile) filtered = filtered.filter(p => p.profileId === ui.activeProfile || !p.profileId);
    if(ui.search) filtered = filtered.filter(p => p.title.toLowerCase().includes(ui.search) || p.tags.toLowerCase().includes(ui.search));

    if(!filtered.length){
      zone.innerHTML = `<div class="empty-state"><b>No hay Prompts aquí</b><br>Crea tu primer prompt para tenerlo a un clic.</div>`;
      return;
    }

    zone.innerHTML = `<div class="prompts-grid">` + filtered.map(p => `
      <div class="prompt-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <h4 class="prompt-title">${escapeHtml(p.title)}</h4>
          <button class="icon-btn danger" style="width:24px;height:24px;font-size:10px;" data-action="delete-prompt" data-id="${p.id}">✖</button>
        </div>
        <div class="prompt-tags">${(p.tags||'').split(',').map(t=> t.trim() ? `<span class="p-tag">${escapeHtml(t)}</span>`:'').join('')}</div>
        <div class="prompt-body" id="pcontent-${p.id}">${escapeHtml(p.content)}</div>
        <div class="prompt-actions">
          <span style="font-size:10px; color:var(--muted)">${p.profileId ? 'Perfil Específico' : '🌐 Global'}</span>
          <button class="copy-btn" data-action="copy-prompt" data-target="pcontent-${p.id}">📋 Copiar</button>
        </div>
      </div>
    `).join('') + `</div>`;
  }

  /* --- FORMULARIOS --- */
  function renderForm(){
    const zone = document.getElementById('formZone');
    if(!ui.showForm){ zone.innerHTML = ''; return; }
    
    if(ui.showForm === 'profile'){
      zone.innerHTML = `
        <form class="glass-panel form-panel" id="formProfile" style="margin-bottom:20px;">
          <h3>✨ Nuevo Perfil</h3>
          <div class="form-grid"><input name="name" placeholder="Nombre (Ej. Chrome Trabajo)" required></div>
          <div class="form-actions">
            <button type="button" class="btn ghost" data-action="close-form">Cancelar</button>
            <button type="submit" class="btn primary">Crear Perfil</button>
          </div>
        </form>`;
    } 
    else if(ui.showForm === 'account'){
      zone.innerHTML = `
        <form class="glass-panel form-panel" id="formAccount" style="margin-bottom:20px;">
          <h3>🤖 Añadir Herramienta IA</h3>
          <div class="form-grid">
            <select name="profileId">${state.profiles.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
            <input name="service" placeholder="IA (ChatGPT, Claude...)" required>
            <input name="email" placeholder="Correo de cuenta">
          </div>
          <div class="form-actions"><button type="button" class="btn ghost" data-action="close-form">Cancelar</button><button type="submit" class="btn success">Guardar</button></div>
        </form>`;
    }
    else if(ui.showForm === 'prompt'){
      zone.innerHTML = `
        <form class="glass-panel form-panel" id="formPrompt" style="margin-bottom:20px; border-top-color:var(--purple);">
          <h3>📝 Crear Prompt Mágico</h3>
          <div class="form-grid">
            <input name="title" placeholder="Título (Ej. Revisor de Código)" required>
            <input name="tags" placeholder="Etiquetas separadas por coma (Ej. Code, Python)">
            <select name="profileId"><option value="">🌐 Visible en Todos los Perfiles</option>${state.profiles.map(p=>`<option value="${p.id}" ${ui.activeProfile===p.id?'selected':''}>Solo para: ${p.name}</option>`).join('')}</select>
          </div>
          <textarea name="content" placeholder="Escribe tu prompt aquí..." style="margin-top:14px;" required></textarea>
          <div class="form-actions"><button type="button" class="btn ghost" data-action="close-form">Cancelar</button><button type="submit" class="btn primary">Guardar Prompt</button></div>
        </form>`;
    }
    window.scrollTo({top:0, behavior:'smooth'});
  }

  /* ============================================================
     INTERACCIONES Y EVENTOS
     ============================================================ */
  document.addEventListener('click', async e => {
    const t = e.target.closest('[data-action]'); if(!t) return;
    const act = t.dataset.action;

    // Navegación Tabs
    if(e.target.closest('.tab-btn')){
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.closest('.tab-btn').classList.add('active');
      ui.activeTab = e.target.closest('.tab-btn').dataset.tab;
      ui.search = ''; renderAll();
    }
    
    // Acciones simples
    if(act === 'set-profile'){ ui.activeProfile = t.dataset.id || null; renderAll(); }
    if(act === 'open-form'){ ui.showForm = t.dataset.type; renderForm(); }
    if(act === 'close-form'){ ui.showForm = null; renderForm(); }
    
    // Extensión Mock
    if(act === 'inject-ext'){
      const svc = t.dataset.service;
      showToast(`Inyectando sesión de ${svc} vía extensión...`, 'ext');
    }
    
    // Copiar Prompt
    if(act === 'copy-prompt'){
      const text = document.getElementById(t.dataset.target).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const original = t.innerHTML; t.innerHTML = '✅ Copiado'; t.style.background = 'var(--mint)'; t.style.color = '#fff';
        setTimeout(()=>{ t.innerHTML = original; t.style.background=''; t.style.color=''; }, 2000);
      });
    }

    // Borrar Prompt
    if(act === 'delete-prompt'){
      await apiFetch(`/api/prompts/${t.dataset.id}`, { method:'DELETE' });
      showToast('Prompt borrado', 'success'); renderMain();
    }
  });

  // Formularios
  document.addEventListener('submit', async e => {
    e.preventDefault(); const fd = new FormData(e.target);
    const body = Object.fromEntries(fd.entries());
    
    if(e.target.id === 'formProfile'){
      await apiFetch('/api/profiles', { method:'POST', body: JSON.stringify(body) }); showToast('Perfil Creado', 'success');
    } else if(e.target.id === 'formAccount'){
      await apiFetch('/api/accounts', { method:'POST', body: JSON.stringify(body) }); showToast('Cuenta Creada', 'success');
    } else if(e.target.id === 'formPrompt'){
      await apiFetch('/api/prompts', { method:'POST', body: JSON.stringify(body) }); showToast('Prompt Guardado', 'success');
    }
    ui.showForm = null; renderAll();
  });

  /* INICIO */
  apiFetch('/api/state').then(s => { state = s; renderAll(); });

})();
</script>
</body>
</html>
